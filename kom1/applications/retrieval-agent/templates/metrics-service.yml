apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: retrieval-agent-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    prometheus: prometheus
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: retrieval-agent
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      interval: 15s
      path: /metrics
      bearerTokenSecret:
        name: retrieval-agent-secrets
        key: API_KEY
