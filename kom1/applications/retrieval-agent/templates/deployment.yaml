apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: retrieval-agent
    app.kubernetes.io/instance: retrieval-agent
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.persistence.enabled }}
  # The model cache PVC is ReadWriteOnce, so a rolling update would deadlock on
  # the new pod waiting for a volume the old pod still holds. Recreate avoids it.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval-agent
      app.kubernetes.io/instance: retrieval-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retrieval-agent
        app.kubernetes.io/instance: retrieval-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: retrieval-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "{{ .Values.containerPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: retrieval-agent-env
            - secretRef:
                name: retrieval-agent-secrets
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: retrieval-agent-model-cache
      {{- end }}
