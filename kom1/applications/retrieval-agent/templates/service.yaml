apiVersion: v1
kind: Service
metadata:
  name: retrieval-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: retrieval-agent
    app.kubernetes.io/instance: retrieval-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: retrieval-agent
    app.kubernetes.io/instance: retrieval-agent
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
