replicaCount: 1

image:
  repository: gotenberg/gotenberg
  tag: "8"
  pullPolicy: IfNotPresent

# Locked-down Chromium: no JS, only allowed to read files under /tmp.
command:
  - gotenberg
  - "--chromium-disable-javascript=true"
  - "--chromium-allow-list=file:///tmp/.*"

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# /health is polled by both probes; mirrors the compose healthcheck.
probes:
  path: /health
  startupSeconds: 20

# The gotenberg image's USER is the name "gotenberg" (not a numeric UID), so the
# kubelet can't verify non-root from the image alone. Pin the numeric UID/GID
# (gotenberg user is 1001:1001) so runAsNonRoot admission succeeds.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
