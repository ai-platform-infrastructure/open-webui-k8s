apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingestion-service-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    prometheus: prometheus
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: ingestion-service
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      interval: 15s
      path: /metrics
      bearerTokenSecret:
        name: ingestion-service-secrets
        key: API_KEY
